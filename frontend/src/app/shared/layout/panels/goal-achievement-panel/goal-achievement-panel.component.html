<section class="goal-achievement-panel" [attr.data-status]="status">
  <div class="goal-achievement-panel__top">
    <div>
      <p class="goal-achievement-panel__eyebrow">Goal Achievement</p>
      <h3>{{ title }}</h3>
    </div>

    <span class="goal-achievement-panel__badge">
      {{ statusLabel }}
    </span>
  </div>

  <div class="goal-achievement-panel__metric">
    <span class="goal-achievement-panel__value">{{ progress }}%</span>
    <span class="goal-achievement-panel__label">{{ targetLabel }}</span>
  </div>

  <div
    class="goal-achievement-panel__bar"
    role="progressbar"
    aria-label="Goal achievement progress"
    [attr.aria-valuenow]="progress"
    aria-valuemin="0"
    aria-valuemax="100">
    <span [style.width.%]="progress"></span>
  </div>

  <p class="goal-achievement-panel__hint">
    This panel is ready for runtime data. Configure goal metrics through panel config or connect it to session state.
  </p>
</section>
