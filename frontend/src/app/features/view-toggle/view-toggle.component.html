@if (store.session()) {
  <div class="view-toggle">
    <span class="label">View</span>
    <sbb-checkbox-group orientation="horizontal" size="s">
      <sbb-checkbox
        [checked]="store.showMap()"
        (change)="toggleMap()">
        ▦ Map
      </sbb-checkbox>
      <sbb-checkbox
        [checked]="store.showMarey()"
        (change)="toggleMarey()">
        ⊞ Marey
      </sbb-checkbox>
    </sbb-checkbox-group>
  </div>
}
