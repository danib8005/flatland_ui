@if (store.session()) {
  <svg
    #svgRoot
    class="flatland-svg"
    [attr.viewBox]="viewBox()"
    preserveAspectRatio="xMidYMid meet"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseLeave()"
    (wheel)="onWheel($event)">
    <!-- Background -->
    <rect
      x="0" y="0"
      [attr.width]="store.width() * cellSize"
      [attr.height]="store.height() * cellSize"
      class="bg" />

    <!-- Rail Tiles (always visible) -->
    @for (t of tiles(); track trackByTile($index, t)) {
      <image
        [attr.href]="tileHref(t)"
        [attr.x]="tileX(t)"
        [attr.y]="tileY(t)"
        [attr.width]="cellSize"
        [attr.height]="cellSize"
        [attr.transform]="tileTransform(t)"
        [attr.opacity]="railOpacity()"
        class="rail-tile" />
    }

    <!-- Targets (always visible) -->
    @for (a of agents(); track trackByAgent($index, a)) {
      <rect
        [attr.x]="targetX(a) - 8"
        [attr.y]="targetY(a) - 8"
        width="16"
        height="14"
        [attr.fill]="agentColor(a.handle)"
        opacity="0.5"
        stroke="white"
        stroke-width="1.5"
        class="target" />
    }

    <!-- Trains layer: decision flow line + decision-cell marker + action pills.
         Only this overlay set is toggled by the Trains layer; the agents
         themselves remain visible. -->
    @if (store.layerVisibility().nextDecisions) {
      @for (layer of decisionLayers(); track trackByLayer($index, layer)) {
        <g class="decision-layer">
          <path
            [attr.d]="layer.pathD"
            [attr.stroke]="layer.color"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-dasharray="6 6"
            opacity="0.85"
            class="decision-path" />

          <circle
            [attr.cx]="layer.decisionCx"
            [attr.cy]="layer.decisionCy"
            r="9"
            fill="none"
            [attr.stroke]="layer.color"
            stroke-width="2.5"
            opacity="0.9"
            class="decision-marker" />
        </g>
      }

      @for (layer of decisionLayers(); track trackByLayer($index, layer)) {
        <g class="decision-pills" opacity="0.9">
          @for (pill of layer.options; track trackByPill($index, pill); let i = $index) {
            <g
              class="pill"
              [class.override]="pill.isOverride"
              (click)="onPillClick(layer.handle, pill.action, pill.isOverride)">
              <rect
                [attr.x]="layer.pillsX"
                [attr.y]="layer.pillsY + i * 16"
                width="56"
                height="14"
                rx="8"
                ry="8"
                [attr.fill]="pill.isOverride ? '#eb0000' : 'white'"
                [attr.stroke]="layer.color"
                stroke-width="1.5"
                class="pill-bg" />
              <text
                [attr.x]="layer.pillsX + 28"
                [attr.y]="layer.pillsY + i * 16 + 10"
                text-anchor="middle"
                font-size="9"
                font-weight="600"
                [attr.fill]="pill.isOverride ? 'white' : '#212121'"
                class="pill-text">
                {{ pill.label }}
              </text>
            </g>
          }
        </g>
      }
    }

    <!-- Agents (ALWAYS visible - never gated by any layer toggle) -->
    @for (a of agents(); track trackByAgent($index, a)) {
      <g
        class="agent"
        [class.selected]="isSelected(a.handle)"
        (click)="toggleSelect(a.handle)">
        <circle
          [attr.cx]="agentX(a)"
          [attr.cy]="agentY(a)"
          r="11"
          [attr.fill]="agentColor(a.handle)"
          stroke="white"
          stroke-width="2.5" />
        <text
          [attr.x]="agentX(a)"
          [attr.y]="agentY(a) + 4"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="white">
          {{ a.handle }}
        </text>
      </g>
    }
  </svg>

  <!-- Map Navigation Overlay (unten links) -->
  <div class="map-nav-overlay">
    <button class="nav-btn nav-up" (click)="panStep(0, 1)" title="Pan up">↑</button>
    <button class="nav-btn nav-left" (click)="panStep(1, 0)" title="Pan left">←</button>
    <button class="nav-btn nav-center" (click)="resetPan()" title="Center / Reset zoom">⌂</button>
    <button class="nav-btn nav-right" (click)="panStep(-1, 0)" title="Pan right">→</button>
    <button class="nav-btn nav-down" (click)="panStep(0, -1)" title="Pan down">↓</button>
  </div>

  <!-- Zoom controls -->
  <div class="map-zoom-overlay">
    <button class="nav-btn" (click)="zoomIn()" title="Zoom in">+</button>
    <span class="zoom-value">{{ zoomPercent() }}%</span>
    <button class="nav-btn" (click)="zoomOut()" title="Zoom out">−</button>
  </div>

  <!-- Rail opacity control -->
  <div class="map-opacity-overlay">
    <label class="opacity-label" title="Rail tiles opacity">
      <span class="opacity-icon">🛤</span>
      <input
        type="range"
        min="0" max="1" step="0.05"
        [value]="railOpacity()"
        (input)="railOpacity.set(+$any($event.target).value)"
        class="opacity-slider" />
      <span class="opacity-value">{{ opacityPercent() }}%</span>
    </label>
  </div>
} @else {
  <div class="welcome-card">
    <h2>Welcome</h2>
    <p class="subtitle">Configure and start a new Flatland session</p>

    <sbb-button size="m" (click)="onNewSession()">
      + New Session
    </sbb-button>

    <div class="welcome-inputs">
      <label class="welcome-input">
        <span>Width</span>
        <input type="number" min="25" max="200"
               [value]="newWidth()"
               (input)="newWidth.set(+$any($event.target).value)">
      </label>
      <label class="welcome-input">
        <span>Height</span>
        <input type="number" min="20" max="150"
               [value]="newHeight()"
               (input)="newHeight.set(+$any($event.target).value)">
      </label>
      <label class="welcome-input">
        <span>Agents</span>
        <input type="number" min="1" max="50"
               [value]="newAgents()"
               (input)="newAgents.set(+$any($event.target).value)">
      </label>
    </div>
  </div>
}
