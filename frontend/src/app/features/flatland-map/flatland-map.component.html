@if (store.session()) {
  <svg
    #svgRoot
    class="flatland-svg"
    [attr.viewBox]="viewBox()"
    preserveAspectRatio="xMidYMid meet"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseLeave()"
    (wheel)="onWheel($event)">
    <!-- Background -->
    <rect
      x="0" y="0"
      [attr.width]="store.width() * cellSize"
      [attr.height]="store.height() * cellSize"
      class="bg" />

    <!-- Grid layer: thin cell borders for orientation -->
    @if (store.layerVisibility().grid) {
      @for (t of tiles(); track trackByTile($index, t)) {
        <rect
          [attr.x]="tileX(t)"
          [attr.y]="tileY(t)"
          [attr.width]="cellSize"
          [attr.height]="cellSize"
          fill="none"
          stroke="rgba(120,120,120,0.35)"
          stroke-width="0.4"
          class="grid-cell"
          pointer-events="none" />
      }
    }

    <!-- Selected-agent trajectory: cell background overlay in agent color,
         darker for past, lighter for forecast (same semantics as Marey). -->
    @if (false && selectedTrajectoryCells().length > 0) {
      @for (cell of selectedTrajectoryCells(); track cell.id) {
        <defs>
          <mask [attr.id]="'traj-mask-' + cell.id" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" mask-type="alpha">
            <image
              [attr.href]="cell.href"
              [attr.x]="cell.x"
              [attr.y]="cell.y"
              [attr.width]="cellSize"
              [attr.height]="cellSize"
              [attr.transform]="cell.transform" />
          </mask>
        </defs>
        <rect
          [attr.x]="cell.x"
          [attr.y]="cell.y"
          [attr.width]="cellSize"
          [attr.height]="cellSize"
          [attr.fill]="cell.color"
          [attr.opacity]="cell.opacity"
          [attr.mask]="'url(#traj-mask-' + cell.id + ')'"
          class="trajectory-rail"
          pointer-events="none" />
      }
    }

        <!-- Rail Tiles (always visible) -->
    @for (t of tiles(); track trackByTile($index, t)) {
      <image
        [attr.href]="tileHref(t)"
        [attr.x]="tileX(t)"
        [attr.y]="tileY(t)"
        [attr.width]="cellSize"
        [attr.height]="cellSize"
        [attr.transform]="tileTransform(t)"
        [attr.opacity]="railOpacity()"
        class="rail-tile" />
    }

      <!-- Segment-exact future trajectory overlay.
           Rendered above rail tiles so switch branches can be highlighted
           without tinting the whole switch tile. -->
      @if (selectedTrajectoryFutureSegments().length > 0) {
        <g class="trajectory-future-segments" pointer-events="none">
          @for (seg of selectedTrajectoryFutureSegments(); track seg.id) {
            <path
              [attr.d]="seg.d"
              class="trajectory-future-segment-casing"
              fill="none"
              pointer-events="none" />
            <path
              [attr.d]="seg.d"
              [attr.stroke]="seg.color"
              [attr.opacity]="seg.opacity"
              class="trajectory-future-segment"
              fill="none"
              pointer-events="none" />
          }
        </g>
      }
    <!-- Targets (always visible) -->
    @for (a of agents(); track trackByAgent($index, a)) {
      <rect
        [attr.x]="targetX(a) - 8"
        [attr.y]="targetY(a) - 8"
        width="16"
        height="14"
        [attr.fill]="agentColor(a.handle)"
        opacity="0.5"
        stroke="white"
        stroke-width="1.5"
        class="target" />
    }

    <!-- Switches layer: small directional glyph at every switch-cell -->
    @if (store.layerVisibility().switches) {
      <!-- Animated ">>>>>" inflow line per switch entry direction.
           Starts 25% inside the neighbour cell and runs to the centre. -->
      @for (f of switchInflows(); track f.id) {
        <line class="switch-inflow"
              [attr.x1]="f.x1" [attr.y1]="f.y1"
              [attr.x2]="f.x2" [attr.y2]="f.y2"
              stroke="var(--layer-color-switches)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-dasharray="4 4"
              opacity="0.85" />
      }
      <!-- One arrow per exit: a line from cell centre out to the cell edge,
           ending 5% before the edge with an arrowhead. The arrow native
           direction is "up"; rotation = exit_dir * 90deg. -->
      @for (m of switchExitArrows(); track m.id) {
        <g class="switch-exit"
           [attr.transform]="'translate(' + m.cx + ',' + m.cy + ') rotate(' + m.rotation + ')'">
          <!-- shaft: from centre (0,0) out toward the edge.
               cellSize=32, arrow tip at -14.4 (= -0.45*32),
               shaft stops at -10 to leave room for the head. -->
          <line class="switch-exit-shaft"
                x1="0" y1="0" x2="0" y2="-6"
                stroke="var(--layer-color-switches)"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-dasharray="2 2" />
          <!-- arrowhead stays static so the tip is a stable visual anchor -->
          <path d="M 0 -10.5 L 2.5 -6 L -2.5 -6 Z"
                fill="var(--layer-color-switches)"
                stroke="white"
                stroke-width="0.5"
                stroke-linejoin="round" />
        </g>
      }
    }

    <!-- Signals layer: small ">" glyph at the outgoing edge of each merge-cell -->
    @if (store.layerVisibility().signals) {
      @for (m of signalMarkers(); track m.id) {
        <g class="signal-marker"
           [attr.transform]="'translate(' + m.x + ',' + m.y + ') rotate(' + m.rotation + ')'">
          <!-- Arrow native shape points NORTH (up). Rotation = direction*90:
               0=N -> 0deg (up), 1=E -> 90deg (right), 2=S -> 180deg (down), 3=W -> 270deg (left). -->
          <path d="M 0 -6 L 5 2 L -5 2 Z"
                fill="var(--layer-color-signals)"
                stroke="white"
                stroke-width="0.8"
                stroke-linejoin="round" />
          <text x="0" y="10" text-anchor="middle"
                font-size="6" fill="black" stroke="white" stroke-width="0.4"
                paint-order="stroke">{{ m.d }}</text>
        </g>
      }
    }

        <!-- Trains layer: decision flow line + decision-cell marker + action pills.
         Only this overlay set is toggled by the Trains layer; the agents
         themselves remain visible. -->
    @if (store.layerVisibility().nextDecisions) {
      <!-- Destination markers per agent: when an agent has a next decision,
           always show the right symbol on the target cell. This is part of
           the Next-Decisions layer, regardless of the All-Switches /
           All-Signals toggles. -->
      @for (f of decisionDestSwitchInflows(); track f.id) {
        <line class="switch-inflow"
              [attr.x1]="f.x1" [attr.y1]="f.y1"
              [attr.x2]="f.x2" [attr.y2]="f.y2"
              stroke="var(--layer-color-switches)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-dasharray="4 4"
              opacity="0.85" />
      }
      @for (m of decisionDestSwitchExits(); track m.id) {
        <g class="switch-exit"
           [attr.transform]="'translate(' + m.cx + ',' + m.cy + ') rotate(' + m.rotation + ')'">
          <line class="switch-exit-shaft"
                x1="0" y1="0" x2="0" y2="-6"
                stroke="var(--layer-color-switches)"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-dasharray="2 2" />
          <path d="M 0 -10.5 L 2.5 -6 L -2.5 -6 Z"
                fill="var(--layer-color-switches)"
                stroke="white"
                stroke-width="0.5"
                stroke-linejoin="round" />
        </g>
      }
      @for (m of decisionDestSignals(); track m.id) {
        <g class="signal-marker"
           [attr.transform]="'translate(' + m.x + ',' + m.y + ') rotate(' + m.rotation + ')'">
          <path d="M 0 -6 L 5 2 L -5 2 Z"
                fill="var(--layer-color-signals)"
                stroke="white"
                stroke-width="0.8"
                stroke-linejoin="round" />
        </g>
      }

      @for (layer of decisionLayers(); track trackByLayer($index, layer)) {
        <g class="decision-layer">
          <path
            [attr.d]="layer.pathD"
            [attr.stroke]="layer.color"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-dasharray="6 6"
            opacity="0.85"
            class="decision-path" />

          <circle
            [attr.cx]="layer.decisionCx"
            [attr.cy]="layer.decisionCy"
            r="9"
            fill="none"
            [attr.stroke]="layer.color"
            stroke-width="1.25"
            opacity="0.9"
            class="decision-marker" />
        </g>
      }

      @for (layer of decisionLayers(); track trackByLayer($index, layer)) {
        <g class="decision-pills" opacity="0.9">
          @for (pill of layer.options; track trackByPill($index, pill); let i = $index) {
            <g
              class="pill"
              [class.override]="pill.isOverride"
              (click)="onPillClick(layer.handle, pill.action, pill.isOverride)">
              <rect
                [attr.x]="layer.pillsX"
                [attr.y]="layer.pillsY + i * 16"
                width="56"
                height="14"
                rx="8"
                ry="8"
                [attr.fill]="pill.isOverride ? '#eb0000' : 'white'"
                [attr.stroke]="layer.color"
                stroke-width="1.5"
                class="pill-bg" />
              <text
                [attr.x]="layer.pillsX + 28"
                [attr.y]="layer.pillsY + i * 16 + 10"
                text-anchor="middle"
                font-size="9"
                font-weight="600"
                [attr.fill]="pill.isOverride ? 'white' : '#212121'"
                class="pill-text">
                {{ pill.label }}
              </text>
            </g>
          }
        </g>
      }
    }

    <!-- Agents (ALWAYS visible - never gated by any layer toggle) -->
    @for (a of agents(); track trackByAgent($index, a)) {
      <g
        class="agent"
        [class.selected]="isSelected(a.handle)"
        [class.notification-hover]="isNotificationHovered(a.handle)"
        (mouseenter)="onAgentMouseEnter(a.handle)"
        (mouseleave)="onAgentMouseLeave()"
        (click)="toggleSelect(a.handle)">
        <circle
          [attr.cx]="agentX(a)"
          [attr.cy]="agentY(a)"
          r="11"
          [attr.fill]="agentColor(a.handle)"
          stroke="white"
          stroke-width="2.5" />
        <text
          [attr.x]="agentX(a)"
          [attr.y]="agentY(a) + 4"
          text-anchor="middle"
          font-size="11"
          font-weight="bold"
          fill="white">
          {{ a.handle }}
        </text>
        @if (shouldRenderAgentTargetHighlight(a)) {
          <g
            class="agent-target-highlight"
            [class.selected-target]="isSelected(a.handle)"
            [style.--agent-target-color]="agentTargetHighlightColor(a)">
            <circle
              class="agent-target-ring"
              [attr.cx]="targetX(a)"
              [attr.cy]="targetY(a)"
              r="13" />
            <circle
              class="agent-target-dot"
              [attr.cx]="targetX(a)"
              [attr.cy]="targetY(a)"
              r="3" />
            <path
              class="agent-target-cross"
              [attr.d]="'M ' + (targetX(a) - 8) + ' ' + targetY(a) +
                        ' L ' + (targetX(a) + 8) + ' ' + targetY(a) +
                        ' M ' + targetX(a) + ' ' + (targetY(a) - 8) +
                        ' L ' + targetX(a) + ' ' + (targetY(a) + 8)" />
          </g>
        }


        @if (isMalfunctioning(a)) {
          <circle
            class="malfunction-badge-bg"
            [attr.cx]="agentX(a) + 12"
            [attr.cy]="agentY(a) - 12"
            r="9.5" />
          <text
            class="malfunction-badge-text"
            [attr.x]="agentX(a) + 12"
            [attr.y]="agentY(a) - 7"
            text-anchor="middle">!</text>
        }



      </g>
    }
  </svg>

  <!-- Map Navigation Overlay (unten links) -->
  <div class="map-nav-overlay">
    <button class="nav-btn nav-up" (click)="panStep(0, 1)" title="Pan up">↑</button>
    <button class="nav-btn nav-left" (click)="panStep(1, 0)" title="Pan left">←</button>
    <button class="nav-btn nav-center" (click)="resetPan()" title="Center / Reset zoom">⌂</button>
    <button class="nav-btn nav-right" (click)="panStep(-1, 0)" title="Pan right">→</button>
    <button class="nav-btn nav-down" (click)="panStep(0, -1)" title="Pan down">↓</button>
  </div>

  <!-- Zoom controls -->
  <div class="map-zoom-overlay">
    <button class="nav-btn" (click)="zoomIn()" title="Zoom in">+</button>
    <span class="zoom-value">{{ zoomPercent() }}%</span>
    <button class="nav-btn" (click)="zoomOut()" title="Zoom out">−</button>
  </div>

  <!-- Rail opacity control -->
  <div class="map-opacity-overlay">
    <label class="opacity-label" title="Rail tiles opacity">
      <span class="opacity-icon">🛤</span>
      <input
        type="range"
        min="0" max="1" step="0.05"
        [value]="railOpacity()"
        (input)="railOpacity.set(+$any($event.target).value)"
        class="opacity-slider" />
      <span class="opacity-value">{{ opacityPercent() }}%</span>
    </label>
  </div>
} @else {
  <div class="welcome-card">
    <h2>Welcome</h2>
    <p class="subtitle">Configure and start a new Flatland session</p>

    <sbb-button size="m" (click)="onNewSession()">
      + New Session
    </sbb-button>

    <div class="welcome-inputs">
      <label class="welcome-input">
        <span>Width</span>
        <input type="number" min="25" max="200"
               [value]="newWidth()"
               (input)="newWidth.set(+$any($event.target).value)">
      </label>
      <label class="welcome-input">
        <span>Height</span>
        <input type="number" min="20" max="150"
               [value]="newHeight()"
               (input)="newHeight.set(+$any($event.target).value)">
      </label>
      <label class="welcome-input">
        <span>Agents</span>
        <input type="number" min="1" max="50"
               [value]="newAgents()"
               (input)="newAgents.set(+$any($event.target).value)">
      </label>
    </div>
  </div>
}
