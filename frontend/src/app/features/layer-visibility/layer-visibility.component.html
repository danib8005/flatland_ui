<div class="layer-visibility">
  <h3 class="panel-title">Layer Visibility</h3>
  <div class="layers">
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().grid"
             (change)="toggle('grid')">
      <span>Grid</span>
    </label>
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().nextDecisions"
             (change)="toggle('nextDecisions')">
      <span>Next Decisions</span>
    </label>
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().switches"
             (change)="toggle('switches')">
      <span>All Switches</span>
    </label>
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().signals"
             (change)="toggle('signals')">
      <span>All Signals</span>
    </label>
  </div>
</div>
