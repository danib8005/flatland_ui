<div class="layer-visibility">
  <span class="lv-label">Layers</span>
  <div class="layers">
    <button type="button" class="layer-chip" [class.on]="store.layerVisibility().grid" [attr.aria-pressed]="store.layerVisibility().grid" (click)="toggle('grid')">Grid</button>
    <button type="button" class="layer-chip" [class.on]="store.layerVisibility().nextDecisions" [attr.aria-pressed]="store.layerVisibility().nextDecisions" (click)="toggle('nextDecisions')">Decisions</button>
    <button type="button" class="layer-chip" [class.on]="store.layerVisibility().agentTrajectory" [attr.aria-pressed]="store.layerVisibility().agentTrajectory" (click)="toggle('agentTrajectory')">Trajectory</button>
    <button type="button" class="layer-chip" [class.on]="store.layerVisibility().switches" [attr.aria-pressed]="store.layerVisibility().switches" (click)="toggle('switches')">Switches</button>
    <button type="button" class="layer-chip" [class.on]="store.layerVisibility().signals" [attr.aria-pressed]="store.layerVisibility().signals" (click)="toggle('signals')">Signals</button>
  </div>
</div>
