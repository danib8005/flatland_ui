<div class="layer-visibility">
  <h3 class="panel-title">Layer Visibility</h3>
  <div class="layers">
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().trains"
             (change)="toggle('trains')">
      <span class="dot trains"></span>
      <span>Trains</span>
    </label>
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().switches"
             (change)="toggle('switches')">
      <span class="dot switches"></span>
      <span>Switches</span>
    </label>
    <label class="layer-item">
      <input type="checkbox"
             [checked]="store.layerVisibility().signals"
             (change)="toggle('signals')">
      <span class="dot signals"></span>
      <span>Signals</span>
    </label>
  </div>
</div>
