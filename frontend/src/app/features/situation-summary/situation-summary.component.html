<div class="situation">
  <div class="sit-head">
    <h3 class="panel-title">Situation</h3>
    <span class="sit-progress">{{ arrived() }}/{{ total() }} arrived</span>
  </div>

  <div class="sit-bar" [attr.title]="arrivedPct() + '% arrived'">
    <div class="sit-bar-fill" [style.width.%]="arrivedPct()"></div>
  </div>

  <div class="sit-grid">
    <div class="sit-cell">
      <span class="sit-num">{{ active() }}</span>
      <span class="sit-lbl">active</span>
    </div>
    <div class="sit-cell" [class.warn]="delayedCount() > 0">
      <span class="sit-num">{{ delayedCount() }}</span>
      <span class="sit-lbl">delayed @if (totalDelay() > 0) { (+{{ totalDelay() }}) }</span>
    </div>
    <div class="sit-cell" [class.bad]="malfunctions() > 0">
      <span class="sit-num">{{ malfunctions() }}</span>
      <span class="sit-lbl">malfunction{{ malfunctions() === 1 ? '' : 's' }}</span>
    </div>
  </div>
</div>
