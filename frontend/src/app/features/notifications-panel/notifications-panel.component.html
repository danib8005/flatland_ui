<div class="notifications-panel">
  <h3 class="panel-title">Notifications</h3>

  @if (store.notifications().length === 0) {
    <p class="empty">No notifications</p>
  } @else {
    <ul class="notif-list">
      @for (n of store.notifications(); track n.id) {
        <li class="notif"
            [class.kind-error]="n.kind === 'error'"
            [class.kind-warning]="n.kind === 'warning'"
            [class.kind-info]="n.kind === 'info'"
            [class.agent-related]="isAgentRelated(n)"
            [class.selected-agent-related]="isSelectedAgentRelated(n)"
            [class.hovered-agent-related]="isHoveredAgentRelated(n)"
            (mouseenter)="onNotificationMouseEnter(n)"
            (mouseleave)="onNotificationMouseLeave()"
            (click)="focus(n)">
          <span class="icon">{{ iconFor(n.kind) }}</span>
          <div class="content">
            <span class="title">{{ n.title }}</span>
            <span class="msg">{{ n.message }}</span>
            @if (n.relatedElement) {
              <span class="related">
                {{ n.relatedElement.kind }} #{{ n.relatedElement.id }}
              </span>
            }
          </div>
          <button class="dismiss"
                  (click)="dismiss(n, $event)"
                  title="Dismiss">×</button>
        </li>
      }
    </ul>
  }
</div>
