@if (isCanvasPanel) {
  <div
    class="layout-panel-shell layout-panel-shell--canvas"
    [attr.data-panel-type]="panel.type"
    [attr.data-panel-zone]="panel.zone"
  >
    <div class="layout-panel-shell__header layout-panel-shell__header--canvas">
      <span class="layout-panel-shell__title">{{ panel.title }}</span>
    </div>

    <div class="layout-panel-shell__body layout-panel-shell__body--canvas">
      <app-panel-plugin-host [panel]="panel"></app-panel-plugin-host>
    </div>
  </div>
} @else {
  <sbb-expansion-panel
    class="layout-panel-shell layout-panel-shell--expansion"
    color="white"
    size="s"
    [attr.data-panel-type]="panel.type"
    [attr.data-panel-zone]="panel.zone"
    [attr.expanded]="expandedAttribute"
  >
    <sbb-expansion-panel-header (click)="toggleExpanded()">
      <div class="layout-panel-shell__header">
        <span class="layout-panel-shell__title">{{ panel.title }}</span>

        @if (panel.hidden) {
          <span class="layout-panel-shell__meta">Hidden</span>
        }
      </div>
    </sbb-expansion-panel-header>

    <sbb-expansion-panel-content class="layout-panel-shell__content">
      @if (isExpanded()) {
        <div class="layout-panel-shell__body layout-panel-shell__body--scroll">
          <app-panel-plugin-host [panel]="panel"></app-panel-plugin-host>
        </div>
      }
    </sbb-expansion-panel-content>
  </sbb-expansion-panel>
}
