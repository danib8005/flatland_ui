<div class="marey-shell">
  @if (pathCells().length === 0) {
    <div class="marey-empty">
      <p>Select an agent to see its time–distance trajectory.</p>
    </div>
  } @else {
    <svg #svgEl
         class="marey-svg"
         [attr.viewBox]="viewBox()"
         preserveAspectRatio="xMidYMid meet"
         (wheel)="onWheel($event)"
         (mousedown)="onMouseDown($event)"
         (mousemove)="onMouseMove($event)"
         (mouseup)="onMouseUp()"
         (mouseleave)="onMouseLeave()">

      <!-- Topology strip: rail tiles along the active agent's path (begradigt) -->
      <g class="marey-topology">
        @for (pt of pathTiles(); track $index) {
          @if (pt) {
            <image
              [attr.href]="'/flatland-svg/' + pt.svg"
              [attr.x]="pt.xCoord - tileSize() / 2"
              [attr.y]="pt.yCoord - tileSize() / 2"
              [attr.width]="tileSize()"
              [attr.height]="tileSize()"
              [attr.transform]="'rotate(' + pt.rot + ' ' + pt.xCoord + ' ' + pt.yCoord + ')'"
              opacity="0.85" />
            @if (showGrid()) {
              <rect
                [attr.x]="pt.xCoord - tileSize() / 2"
                [attr.y]="pt.yCoord - tileSize() / 2"
                [attr.width]="tileSize()"
                [attr.height]="tileSize()"
                fill="none" stroke="#888" stroke-width="1"
                vector-effect="non-scaling-stroke" />
            }
          }
        }
      </g>

      <!-- Bounding lines at start/end of topology -->
      <g class="marey-bounds">
        @if (pathCells().length > 0 && !axesSwapped()) {
          <line
            [attr.x1]="pathCoord(0)" [attr.x2]="pathCoord(0)"
            [attr.y1]="TOPOLOGY_TOP" [attr.y2]="H - PAD.bottom" />
          <line
            [attr.x1]="pathCoord(pathCells().length - 1)"
            [attr.x2]="pathCoord(pathCells().length - 1)"
            [attr.y1]="TOPOLOGY_TOP" [attr.y2]="H - PAD.bottom" />
        }
      </g>

      <!-- Per-cell column lines under the topology, only when grid is on -->
      <g class="marey-vgrid">
        @if (showGrid() && !axesSwapped()) {
          @for (cell of pathCells(); track $index) {
            <line
              [attr.x1]="pathCoord($index) - tileSize() / 2"
              [attr.x2]="pathCoord($index) - tileSize() / 2"
              [attr.y1]="TOPOLOGY_TOP + TOPOLOGY_HEIGHT"
              [attr.y2]="H - PAD.bottom" />
          }
          <line
            [attr.x1]="pathCoord(pathCells().length - 1) + tileSize() / 2"
            [attr.x2]="pathCoord(pathCells().length - 1) + tileSize() / 2"
            [attr.y1]="TOPOLOGY_TOP + TOPOLOGY_HEIGHT"
            [attr.y2]="H - PAD.bottom" />
        }
      </g>

      <g class="marey-grid">
        @for (t of timeTicks(); track t.v) {
          @if (axesSwapped()) {
            <line [attr.x1]="t.coord" [attr.x2]="t.coord"
                  [attr.y1]="PAD.top" [attr.y2]="H - PAD.bottom" />
            <text [attr.x]="t.coord" [attr.y]="PAD.top - 4" text-anchor="middle">{{ t.v }}</text>
          } @else {
            <line [attr.x1]="PAD.left" [attr.x2]="W - PAD.right"
                  [attr.y1]="t.coord" [attr.y2]="t.coord" />
            <text [attr.x]="PAD.left - 8" [attr.y]="t.coord + 4" text-anchor="end">{{ t.v }}</text>
          }
        }
      </g>

      <g class="marey-now">
        @if (axesSwapped()) {
          <line [attr.x1]="nowCoord()" [attr.x2]="nowCoord()"
                [attr.y1]="PAD.top"    [attr.y2]="H - PAD.bottom" />
          <text [attr.x]="nowCoord() + 4" [attr.y]="PAD.top - 4">now</text>
        } @else {
          <line [attr.x1]="PAD.left" [attr.x2]="W - PAD.right"
                [attr.y1]="nowCoord()" [attr.y2]="nowCoord()" />
          <text [attr.x]="W - PAD.right + 4" [attr.y]="nowCoord() + 4">now</text>
        }
      </g>

      <g class="marey-lines">
        @for (line of agentLines(); track line.handle) {
          <g [class.is-active]="line.isActive">
            @if (line.pastD) {
              <path class="past" [attr.d]="line.pastD" [attr.stroke]="line.color" />
            }
            @if (line.futureD) {
              <path class="future" [attr.d]="line.futureD" [attr.stroke]="line.color" />
            }
          </g>
        }
      </g>

      <g class="marey-labels">
        @for (lbl of agentLabels(); track lbl.handle) {
          <g class="agent"
             [class.selected]="isSelected(lbl.handle)"
             (click)="onAgentClick(lbl.handle, $event)">
            <circle
              [attr.cx]="lbl.textX"
              [attr.cy]="TOPOLOGY_TOP + TOPOLOGY_HEIGHT / 2"
              r="11"
              [attr.fill]="lbl.color"
              stroke="white"
              stroke-width="2.5" />
            <text
              [attr.x]="lbl.textX"
              [attr.y]="TOPOLOGY_TOP + TOPOLOGY_HEIGHT / 2 + 4"
              text-anchor="middle"
              font-size="11"
              font-weight="bold"
              fill="white">
              {{ lbl.handle }}
            </text>
          </g>
        }
      </g>
    </svg>

    <!-- Pan cross (bottom-right, like flatland-map) -->
    <div class="map-nav-overlay">
      <button title="Pan up"        class="nav-btn nav-up"     (click)="panStep(0, 1)">↑</button>
      <button title="Pan left"      class="nav-btn nav-left"   (click)="panStep(1, 0)">←</button>
      <button title="Reset zoom + pan" class="nav-btn nav-center" (click)="resetPan()">⌂</button>
      <button title="Pan right"     class="nav-btn nav-right"  (click)="panStep(-1, 0)">→</button>
      <button title="Pan down"      class="nav-btn nav-down"   (click)="panStep(0, -1)">↓</button>
    </div>

    <!-- Zoom overlay (above pan-cross) -->
    <!-- Zoom panel (bottom row, like flatland-map) -->
    <div class="map-zoom-overlay">
      <button title="Zoom in" class="nav-btn" (click)="zoomIn()">+</button>
      <span class="zoom-value">{{ zoomPct() }}%</span>
      <button title="Zoom out" class="nav-btn" (click)="zoomOut()">−</button>
    </div>

    <!-- Swap-axes overlay: where flatland-map has its opacity slider -->
    <div class="map-swap-overlay">
      <button title="Swap horizontal/vertical axes" class="nav-btn"
              [class.active]="axesSwapped()" (click)="swapAxes()">⇄</button>
    </div>
  }
</div>
